<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初芒杯 选手武器ban位录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c0a08;
            --panel-bg: #14120f;
            --border-color: #3a3225;
            --text-main: #d1c5b4;
            --accent-color: #d4af37; 
            --danger-color: #8b0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Serif SC', 'Cinzel', serif;
            background-image: radial-gradient(circle at 50% 0%, #1f1b15 0%, #0c0a08 70%);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .erdtree-title {
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            letter-spacing: 0.15em;
        }

        .draft-container {
            width: 100%;
            max-width: 1100px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            border-radius: 4px;
            padding: 2rem;
            position: relative;
        }
        
        .draft-container::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            pointer-events: none;
        }

        .draft-header {
            text-align: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            position: relative;
        }

        .sync-status {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: sans-serif;
            letter-spacing: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #555;
            box-shadow: 0 0 5px #555;
        }

        .status-dot.online {
            background-color: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        th {
            color: #8b7d6b;
            font-weight: normal;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .player-col {
            color: var(--accent-color);
            font-weight: bold;
        }

        td {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 0;
            position: relative;
            border-top: 1px solid rgba(212, 175, 55, 0.05);
            border-bottom: 1px solid rgba(212, 175, 55, 0.05);
            transition: all 0.3s ease;
        }

        tr td:first-child {
            border-left: 1px solid rgba(212, 175, 55, 0.05);
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
        }

        tr td:last-child {
            border-right: 1px solid rgba(212, 175, 55, 0.05);
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        tr:hover td {
            background-color: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .editable-cell {
            padding: 1.25rem 1rem;
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            text-align: center;
            transition: all 0.2s;
            font-size: 1.05rem;
        }

        .ban-selector {
            cursor: pointer;
        }

        .editable-cell:empty:before {
            content: attr(data-placeholder);
            color: #4a4135;
            font-style: italic;
        }

        .ban-selector:focus, .ban-selector:hover {
            background-color: rgba(212, 175, 55, 0.08);
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);
        }
        
        .player-cell .editable-cell {
            color: #e8e0d5;
            font-weight: bold;
            letter-spacing: 0.05em;
            cursor: default; /* 锁定状态鼠标 */
        }

        /* 添加管理模式下的删除按钮样式 */
        .remove-row-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b0000;
            background: rgba(20, 18, 15, 0.9);
            border: 1px solid #8b0000;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0;
            transition: all 0.2s;
            z-index: 10;
        }

        tr:hover .remove-row-btn { opacity: 0.7; }
        
        .remove-row-btn:hover {
            opacity: 1 !important;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.8);
            background: #8b0000;
            color: white;
        }

        .admin-editable {
            border-bottom: 1px dashed #d4af37;
            cursor: text !important;
            background-color: rgba(212, 175, 55, 0.05);
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            justify-content: center; /* 居中显示管理员按钮 */
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .btn {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.1em;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: rgba(212, 175, 55, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .weapon-dropdown {
            position: absolute;
            background-color: var(--panel-bg);
            border: 1px solid var(--accent-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.9), 0 0 15px rgba(212, 175, 55, 0.1);
            max-height: 300px;
            overflow-y: auto;
            z-index: 50;
            min-width: 160px;
            text-align: center;
        }

        .weapon-option {
            padding: 0.75rem 1rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(58, 50, 37, 0.5);
        }

        .weapon-option:hover {
            background-color: rgba(212, 175, 55, 0.15);
            color: var(--accent-color);
            letter-spacing: 0.1em;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .weapon-unban-option {
            color: #e2e8f0;
            font-weight: bold;
            border-bottom: 1px solid rgba(226, 232, 240, 0.3);
            background-color: rgba(20, 18, 15, 0.95);
        }

        .weapon-unban-option:hover {
            background-color: rgba(226, 232, 240, 0.15);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(226, 232, 240, 0.6);
        }

        .weapon-dropdown::-webkit-scrollbar { width: 6px; }
        .weapon-dropdown::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
        .weapon-dropdown::-webkit-scrollbar-thumb { background: #4a4135; border-radius: 3px; }
        .weapon-dropdown::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
    </style>
</head>
<body>

    <div class="draft-container">
        <div class="draft-header">
            <h1 class="text-3xl font-bold erdtree-title">初芒杯 选手武器ban位录</h1>
            <p class="text-[#8b7d6b] text-sm mt-3 tracking-widest">点击石板，铭刻被封禁的武器</p>
            
            <div class="sync-status" id="syncStatus">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">单机模式</span>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="draftTable">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 80px;">编号</th>
                        <th class="player-col" style="width: 22%;">参赛选手名称</th>
                        <th style="width: 23%;">封印武器 I</th>
                        <th style="width: 23%;">封印武器 II</th>
                        <th style="width: 23%;">封印武器 III</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rows populated by JS -->
                </tbody>
            </table>
        </div>
        
        <div class="controls">
            <!-- 默认控件 -->
            <div id="normalControls" class="flex justify-center w-full">
                <button id="adminMenuBtn" class="btn">◆ 管理员选项 ◆</button>
            </div>
            <!-- 管理员专属控件 (解锁后出现) -->
            <div id="adminControls" class="hidden flex justify-center w-full gap-4">
                <button id="addPlayerBtn" class="btn border-[#22c55e] text-[#22c55e] hover:bg-[#22c55e]/10 hover:border-[#22c55e] shadow-[0_0_10px_rgba(34,197,94,0.1)]">+ 召唤新褪色者</button>
                <button id="exitAdminBtn" class="btn border-[#d4af37] text-[#d4af37] hover:bg-[#d4af37]/10">退出名单编辑</button>
            </div>
        </div>
    </div>

    <!-- 管理员控制台模态框 -->
    <div id="adminModal" class="hidden fixed inset-0 bg-black/80 z-50 flex justify-center items-center backdrop-blur-sm">
        <div class="bg-[#14120f] border border-[#d4af37] p-8 rounded shadow-[0_0_30px_rgba(212,175,55,0.2)] max-w-md w-full text-center relative">
            <h2 class="text-[#d4af37] text-xl mb-4 font-bold tracking-widest">管理员权限</h2>
            <p class="text-[#8b7d6b] text-sm mb-6">请输入密令以执行高级指令。</p>
            
            <input type="password" id="adminPassword" class="w-full bg-black/50 border border-[#3a3225] text-[#d1c5b4] p-3 mb-4 text-center focus:border-[#d4af37] focus:outline-none transition-colors" placeholder="输入密令">
            
            <div id="modalError" class="text-[#8b0000] text-sm mb-6 hidden font-bold tracking-widest">你没资格啊，你没资格。</div>
            
            <div class="flex gap-3 justify-center flex-wrap">
                <button id="unlockEditBtn" class="px-4 py-2 border border-[#22c55e] text-[#22c55e] hover:bg-[#22c55e]/10 transition-all w-full mb-2 font-bold tracking-widest">解锁名单编辑模式 (加人/改名)</button>
                <button id="confirmClearBtn" class="px-4 py-2 border border-[#8b7d6b] text-[#d1c5b4] hover:bg-white/5 transition-all w-full mb-2">清空所有封印武器 (保留名单)</button>
                <button id="confirmResetBtn" class="px-4 py-2 border border-[#8b0000] text-[#8b0000] hover:bg-[#8b0000]/20 hover:shadow-[0_0_15px_rgba(139,0,0,0.4)] transition-all w-full mb-4">紧急重置 38 人名单</button>
                <button id="cancelModalBtn" class="px-8 py-2 text-[#8b7d6b] hover:text-white transition-colors underline text-sm">放弃返回</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AlzaSyChxPPA1xmOg64f6RTKjAdEJHGecxxM6aA",
            authDomain: "bptable.firebaseapp.com",
            databaseURL: "https://bptable-default-rtdb.firebaseio.com",
            projectId: "bptable",
            storageBucket: "bptable.firebasestorage.app",
            messagingSenderId: "516004706615",
            appId: "1:516004706615:web:c957bd35b2239e807682b2"
        };

        const weaponCategories = [
            "短剑", "投掷剑", "直剑", "轻大剑", "大剑", "特大剑", "刺剑", "重刺剑", 
            "曲剑", "大曲剑", "反手剑", "刀", "大刀", "双头剑", "斧", "大斧", "槌", 
            "连枷", "大槌", "特大武器", "矛", "大矛", "戟", "镰刀", "软鞭", "拳头", 
            "格斗术", "钩爪", "兽爪", "调香瓶", "小弓", "长弓", "大弓", "弩", "弩炮", 
            "手杖", "圣印记", "火把", "小盾", "中盾", "大盾"
        ];

        // 官方指定 38 人名单数据 (完全根据截图定制，且名字不可被修改)
        const initialData = [
            { player: "顾小桑", b1: "", b2: "", b3: "" },
            { player: "pinetree", b1: "", b2: "", b3: "" },
            { player: "D503", b1: "", b2: "", b3: "" },
            { player: "谷雨天歌", b1: "", b2: "", b3: "" },
            { player: "伞兵", b1: "", b2: "", b3: "" },
            { player: "Gelaokesi", b1: "", b2: "", b3: "" },
            { player: "窑子", b1: "", b2: "", b3: "" },
            { player: "菜鸡袭生者", b1: "", b2: "", b3: "" },
            { player: "超爱神", b1: "", b2: "", b3: "" },
            { player: "c。。。", b1: "", b2: "", b3: "" },
            { player: "正道骑士", b1: "", b2: "", b3: "" },
            { player: "小骑士", b1: "", b2: "", b3: "" },
            { player: "小登", b1: "", b2: "", b3: "" },
            { player: "broccoli", b1: "", b2: "", b3: "" },
            { player: "Dextromethorphan", b1: "", b2: "", b3: "" },
            { player: "随便", b1: "", b2: "", b3: "" },
            { player: "klown_silent", b1: "", b2: "", b3: "" },
            { player: "鹧鸪", b1: "", b2: "", b3: "" },
            { player: "cotiliena", b1: "", b2: "", b3: "" },
            { player: "美味又易燃", b1: "", b2: "", b3: "" },
            { player: "Knight", b1: "", b2: "", b3: "" },
            { player: "豆麻", b1: "", b2: "", b3: "" },
            { player: "莫名", b1: "", b2: "", b3: "" },
            { player: "Harry", b1: "", b2: "", b3: "" },
            { player: "Dual Greatsworder", b1: "", b2: "", b3: "" },
            { player: "pure man", b1: "", b2: "", b3: "" },
            { player: "Malkavain", b1: "", b2: "", b3: "" },
            { player: "parasol", b1: "", b2: "", b3: "" },
            { player: "网友hi", b1: "", b2: "", b3: "" },
            { player: "O？！", b1: "", b2: "", b3: "" },
            { player: "Nagasaki soyo", b1: "", b2: "", b3: "" },
            { player: "孤独萌新", b1: "", b2: "", b3: "" },
            { player: "杨今天吃什么", b1: "", b2: "", b3: "" },
            { player: "absolutelynerd", b1: "", b2: "", b3: "" },
            { player: "不得其名", b1: "", b2: "", b3: "" },
            { player: "violet", b1: "", b2: "", b3: "" },
            { player: "lordfavnir", b1: "", b2: "", b3: "" },
            { player: "爱坤", b1: "", b2: "", b3: "" }
        ];

        let activeCell = null;
        let isOnline = false;
        let db = null;
        let dbRef = null;

        let isAdminMode = false;
        let currentSnapshotData = []; 
        let isEditingName = false; // 防止编辑名字时被数据库刷新打断

        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            dbRef = ref(db, 'chumang_draft_data'); 
            isOnline = true;
            
            document.getElementById('statusDot').classList.add('online');
            document.getElementById('statusText').textContent = "Online";
            document.getElementById('statusText').style.color = "#22c55e";
        } catch (error) {
            console.error("Firebase 初始化失败", error);
        }

        // 构建下拉菜单
        const dropdown = document.createElement('div');
        dropdown.id = 'weaponDropdown';
        dropdown.className = 'weapon-dropdown hidden';
        document.body.appendChild(dropdown);

        const unbanItem = document.createElement('div');
        unbanItem.className = 'weapon-option weapon-unban-option';
        unbanItem.textContent = '◆ 解除封印 ◆';
        unbanItem.addEventListener('click', (e) => {
            if(activeCell) {
                activeCell.textContent = ''; 
                activeCell.style.color = ''; 
                saveTableData(); 
            }
            dropdown.classList.add('hidden');
            e.stopPropagation();
        });
        dropdown.appendChild(unbanItem);

        weaponCategories.forEach(category => {
            const item = document.createElement('div');
            item.className = 'weapon-option';
            item.textContent = category;
            item.addEventListener('click', (e) => {
                if(activeCell) {
                    activeCell.textContent = category;
                    activeCell.style.color = '#d4af37'; 
                    saveTableData(); 
                }
                dropdown.classList.add('hidden');
                e.stopPropagation();
            });
            dropdown.appendChild(item);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.weapon-dropdown') && !e.target.closest('.ban-selector')) {
                dropdown.classList.add('hidden');
            }
        });

        const tableBody = document.getElementById('tableBody');

        function renderTable(dataArray) {
            tableBody.innerHTML = ''; 
            currentSnapshotData = dataArray; 
            
            dataArray.forEach((data, index) => {
                const tr = document.createElement('tr');
                
                const deleteBtnHtml = isAdminMode ? `<button class="remove-row-btn" data-index="${index}" title="放逐此人">×</button>` : '';
                const editableClass = isAdminMode ? 'admin-editable' : '';
                const editableAttr = isAdminMode ? 'contenteditable="true"' : '';
                
                tr.innerHTML = `
                    <td class="text-center font-bold" style="color: #8b7d6b; user-select: none; border-right: 1px solid rgba(212, 175, 55, 0.05);">${index + 1}</td>
                    
                    <td class="player-cell" style="position: relative;">
                        <div class="editable-cell player-name ${editableClass}" ${editableAttr} data-placeholder="输入真名">${data.player}</div>
                        ${deleteBtnHtml}
                    </td>
                    <td class="ban-cell">
                        <div class="editable-cell ban-selector b1" tabindex="0" data-placeholder="点击选择">${data.b1 || ''}</div>
                    </td>
                    <td class="ban-cell">
                        <div class="editable-cell ban-selector b2" tabindex="0" data-placeholder="点击选择">${data.b2 || ''}</div>
                    </td>
                    <td class="ban-cell">
                        <div class="editable-cell ban-selector b3" tabindex="0" data-placeholder="点击选择">${data.b3 || ''}</div>
                    </td>
                `;

                const weaponSelectors = tr.querySelectorAll('.ban-selector');
                weaponSelectors.forEach(cell => {
                    if(cell.textContent.trim() !== '') cell.style.color = '#d4af37';
                    cell.addEventListener('click', (e) => {
                        activeCell = cell;
                        const rect = cell.getBoundingClientRect();
                        dropdown.style.top = `${rect.bottom + window.scrollY}px`;
                        dropdown.style.left = `${rect.left + window.scrollX + (rect.width / 2) - 80}px`; 
                        dropdown.classList.remove('hidden');
                        e.stopPropagation();
                    });
                });

                if (isAdminMode) {
                    const nameCell = tr.querySelector('.player-name');
                    nameCell.addEventListener('focus', () => { isEditingName = true; });
                    nameCell.addEventListener('blur', () => {
                        isEditingName = false;
                        saveTableData(); 
                    });
                    
                    // 防止回车键换行，回车直接失去焦点并保存
                    nameCell.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            nameCell.blur();
                        }
                    });

                    const delBtn = tr.querySelector('.remove-row-btn');
                    if (delBtn) {
                        delBtn.addEventListener('click', () => {
                            currentSnapshotData.splice(index, 1);
                            if (isOnline && dbRef) set(dbRef, currentSnapshotData);
                            else renderTable(currentSnapshotData);
                        });
                    }
                }

                tableBody.appendChild(tr);
            });
        }

        function saveTableData() {
            const rows = tableBody.querySelectorAll('tr');
            const currentData = [];
            rows.forEach(row => {
                currentData.push({
                    player: row.querySelector('.player-name').textContent.trim(),
                    b1: row.querySelector('.b1').textContent.trim(),
                    b2: row.querySelector('.b2').textContent.trim(),
                    b3: row.querySelector('.b3').textContent.trim()
                });
            });

            if (isOnline && dbRef) {
                set(dbRef, currentData); 
            }
        }

        // 管理员模块逻辑
        const adminModal = document.getElementById('adminModal');
        const adminPassword = document.getElementById('adminPassword');
        const modalError = document.getElementById('modalError');
        const OFFICIAL_PASSWORD = "cm2024";

        document.getElementById('adminMenuBtn').addEventListener('click', () => {
            adminModal.classList.remove('hidden');
            adminPassword.value = '';
            modalError.classList.add('hidden');
        });

        document.getElementById('cancelModalBtn').addEventListener('click', () => {
            adminModal.classList.add('hidden');
        });

        // 解锁编辑权限
        document.getElementById('unlockEditBtn').addEventListener('click', () => {
            if (adminPassword.value === OFFICIAL_PASSWORD) {
                isAdminMode = true;
                adminModal.classList.add('hidden');
                document.getElementById('normalControls').classList.add('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
                renderTable(currentSnapshotData); 
            } else {
                modalError.classList.remove('hidden');
            }
        });

        // 退出编辑权限
        document.getElementById('exitAdminBtn').addEventListener('click', () => {
            isAdminMode = false;
            document.getElementById('normalControls').classList.remove('hidden');
            document.getElementById('adminControls').classList.add('hidden');
            renderTable(currentSnapshotData); 
        });

        // 添加新选手
        document.getElementById('addPlayerBtn').addEventListener('click', () => {
            currentSnapshotData.push({ player: "新褪色者", b1: "", b2: "", b3: "" });
            if (isOnline && dbRef) set(dbRef, currentSnapshotData);
            else renderTable(currentSnapshotData);
            
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        });

        // 仅清空武器功能
        document.getElementById('confirmClearBtn').addEventListener('click', () => {
            if (adminPassword.value === OFFICIAL_PASSWORD) {
                const rows = tableBody.querySelectorAll('tr');
                const currentData = [];
                rows.forEach(row => {
                    currentData.push({
                        player: row.querySelector('.player-name').textContent.trim(),
                        b1: "", b2: "", b3: "" // 强行置空武器
                    });
                });
                if (isOnline && dbRef) {
                    set(dbRef, currentData);
                }
                adminModal.classList.add('hidden');
            } else {
                modalError.classList.remove('hidden');
            }
        });

        // 终极重置功能：应对数据被恶意删除或毁坏
        document.getElementById('confirmResetBtn').addEventListener('click', () => {
            if (adminPassword.value === OFFICIAL_PASSWORD) {
                // 直接向数据库推送最原始的 38 人干净名单
                if (isOnline && dbRef) {
                    set(dbRef, initialData);
                } else {
                    renderTable(initialData); // 单机降级方案
                }
                adminModal.classList.add('hidden');
            } else {
                modalError.classList.remove('hidden');
            }
        });

        // 初始化读取数据
        if (isOnline) {
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                if (data && Array.isArray(data) && data.length > 0) {
                    if (!isEditingName) {
                        renderTable(data);
                    } else {
                        // 如果管理员正在打字，先暂存数据，防止打字被打断
                        currentSnapshotData = data;
                    }
                } else {
                    if (!isEditingName) renderTable(initialData); 
                }
            });
        } else {
            renderTable(initialData);
        }

    </script>
</body>
</html>
